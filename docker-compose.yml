---
services:
  main:
    image: docker.io/dmotte/desktainer:latest
    build: build
    restart: always
    hostname: mydesktainer
    ports:
      - "5900:5900"
      - "6900:6900"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      USERNGO_NAME: myuser
      USERNGO_PSW: myuser
      USERNGO_SUDOER: "true"
      USERNGO_NOPASSWD: "true"
      DESKTAINER_DISABLE_MINIMIZE: "true"
