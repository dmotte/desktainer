---
services:
  main:
    image: docker.io/dmotte/desktainer:latest
    build: build
    restart: always
    hostname: desktainer
    ports:
      - "5900:5900"
      - "6900:6900"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      MAINUSER_NOPASSWORD: "true"
      VNC_PASS: mainuser
